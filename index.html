<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mandiri & QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #047857;
            --primary-hover: #065f46;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0; padding: 16px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%; max-width: 420px;
            background: var(--bg-card);
            padding: 28px 24px; border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        h2 { text-align: center; margin: 0 0 6px 0; color: var(--primary); font-size: 22px; font-weight: 700; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin: 0 0 24px 0; font-weight: 500; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dark); }
        
        input, select {
            width: 100%; padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px; box-sizing: border-box; font-size: 14px;
            outline: none; transition: all 0.2s;
            font-family: inherit; color: var(--text-dark);
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.1); }
        input[readonly] { background-color: #f8fafc; color: #475569; font-weight: 700; letter-spacing: 0.5px; border-style: dashed; }

        .dynamic-field { display: none; animation: fadeIn 0.3s ease-out; }

        .btn {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-weight: 600; font-size: 15px; cursor: pointer;
            transition: background 0.2s; margin-top: 8px;
            box-shadow: 0 4px 12px rgba(4, 120, 87, 0.15);
        }
        .btn:hover { background: var(--primary-hover); }

        .qr-result-box {
            margin-top: 24px; padding-top: 20px;
            border-top: 2px dashed var(--border-color);
            display: none; text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        .btn-download { background: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); }
        .btn-download:hover { background: #1d4ed8; }

        /* LAYOUT ASLI ID CARD HTML (DIDUKUNG SEMUA IPHONE) */
        .idcard-capture-area {
            display: inline-block;
            width: 300px;
            height: 450px;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background-color: #ffffff;
            text-align: left;
        }

        .idcard-bg-img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }

        .idcard-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }

        .idcard-title {
            margin-top: 188px;
            font-family: "Bookman Old Style", Bookman, Georgia, serif;
            font-size: 24px; font-weight: bold;
            color: #024731; text-transform: uppercase;
            text-shadow: 0.5px 0.5px 0px rgba(255,255,255,0.5);
        }

        .idcard-qr-box {
            margin-top: 12px; padding: 6px;
            background: #ffffff; border: 3px solid #024731;
            border-radius: 12px; display: inline-block;
        }
        .idcard-qr-box img { display: block; width: 140px; height: 140px; }

        .idcard-footer-text {
            margin-top: auto; margin-bottom: 24px;
            font-size: 13px; font-weight: 700; color: #024731;
            width: 85%; text-align: center; line-height: 1.3;
            text-transform: uppercase; word-wrap: break-word;
        }

        /* AREA FALLBACK / PREVIEW JPG */
        .preview-holder {
            margin-top: 16px; display: none;
            -webkit-user-select: none; user-select: none; 
        }
        .preview-holder img {
            width: 100%; max-width: 280px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 2px solid var(--border-color);
            display: inline-block; pointer-events: auto !important; -webkit-touch-callout: default !important; 
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Pendaftaran Mandiri</h2>
    <p class="subtitle">Insan Qur'any Tawangmangu</p>
    
    <div class="form-group">
        <label for="id_generus">ID Anggota Anda (Otomatis)</label>
        <input type="text" id="id_generus" readonly>
    </div>
    
    <div class="form-group">
        <label for="nama">Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Ketik nama lengkap sesuai KTP/KK...">
    </div>

    <div class="form-group">
        <label for="jenis_kelamin">Jenis Kelamin</label>
        <select id="jenis_kelamin">
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
        </select>
    </div>

    <div class="form-group">
        <label for="status">Status</label>
        <select id="status" onchange="handleStatusChange()">
            <option value="Generus">Generus</option>
            <option value="Pengurus">Pengurus</option>
        </select>
    </div>

    <div class="form-group dynamic-field" id="field-usia">
        <label for="usia">Usia</label>
        <select id="usia">
            <option value="PAUD">PAUD</option>
            <option value="TK">TK</option>
            <option value="Caberawit">Caberawit</option>
            <option value="Pra Remaja">Pra Remaja</option>
            <option value="Remaja">Remaja</option>
            <option value="Usia Mandiri">Usia Mandiri</option>
        </select>
    </div>

    <div class="form-group dynamic-field" id="field-dapukan">
        <label for="input_dapukan">Dapukan</label>
        <input type="text" id="input_dapukan" placeholder="Ketik dapukan/jabatan pengurus...">
    </div>

    <div class="form-group">
        <label for="kelompok">Kelompok</label>
        <input type="text" id="kelompok" placeholder="Contoh: Kelompok Blimbing 1">
    </div>

    <div class="form-group">
        <label for="desa">Desa</label>
        <input type="text" id="desa" placeholder="Contoh: Karanglo Selatan">
    </div>

    <button class="btn" id="btn-daftar" onclick="prosesPendaftaranMandiri()">Kirim & Buat QR Code</button>

    <div id="result-section" class="qr-result-box">
        <h3 style="margin: 0 0 4px 0; color: var(--primary); font-size: 16px;">✓ Pendaftaran Berhasil!</h3>
        <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 16px 0;">ID Card Anda telah berhasil dibuat.</p>
        
        <div style="width:100%; overflow:hidden; height:0px; opacity:0; position:absolute; left:-9999px;">
            <div id="idcard-html-layout" class="idcard-capture-area">
                <img class="idcard-bg-img" src="https://gttavghryoadthnvwthd.supabase.co/storage/v1/object/public/id_card_barcode/bg-idcard.jpg" crossOrigin="anonymous">
                <div class="idcard-overlay">
                    <div class="idcard-title" id="card-status-title">ID GENERUS</div>
                    <div class="idcard-qr-box">
                        <div id="qrcode-target"></div>
                    </div>
                    <div class="idcard-footer-text" id="card-identitas-text">NAMA USER - IQ12345</div>
                </div>
            </div>
        </div>
        
        <button class="btn btn-download" onclick="unduhIDCardSnapshot()">⬇ Simpan ID Card ke HP</button>

        <div id="preview-container" class="preview-holder" style="display:block;">
            <p style="font-size: 12px; color: var(--text-muted); margin: 14px 0 14px 0; padding: 0 10px; line-height: 1.4;">
                Tekan tepat pada <b>tengah gambar kartu</b> di bawah ini selama 3 detik, lalu pilih <b>"Simpan Gambar"</b> atau <b>"Tambah ke Foto"</b>.
            </p>
            <div style="display: block; margin: 0 auto; width: 100%; text-align: center;">
                <img id="idcard-fallback-img" alt="ID Card Preview">
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://gttavghryoadthnvwthd.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dGF2Z2hyeW9hZHRobnZ3dGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MDI5NDQsImV4cCI6MjA5NjQ3ODk0NH0.0O7I9EqSaiQq8_LKMJS9U-XDuitY6sPfYQVtBsJAeas"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function buatIdOtomatis() {
        if(!document.getElementById('id_generus').value) {
            const teksAwalan = "IQ";
            const angkaAcak = Math.floor(10000 + Math.random() * 90000); 
            document.getElementById('id_generus').value = teksAwalan + angkaAcak;
        }
    }

    function handleStatusChange() {
        const statusValue = document.getElementById('status').value;
        const fieldUsia = document.getElementById('field-usia');
        const fieldDapukan = document.getElementById('field-dapukan');

        if (statusValue === "Generus") {
            fieldUsia.style.display = "block";
            fieldDapukan.style.display = "none";
        } else if (statusValue === "Pengurus") {
            fieldUsia.style.display = "none";
            fieldDapukan.style.display = "block";
        } else {
            fieldUsia.style.display = "none";
            fieldDapukan.style.display = "none";
        }
    }

    window.onload = function() {
        buatIdOtomatis();
        handleStatusChange();
    };

    async function prosesPendaftaranMandiri() {
        let idGenerus = document.getElementById('id_generus').value.trim();
        let nama = document.getElementById('nama').value.trim();
        let jenisKelamin = document.getElementById('jenis_kelamin').value; 
        let status = document.getElementById('status').value;
        let kelompok = document.getElementById('kelompok').value.trim();
        let desa = document.getElementById('desa').value.trim();
        let btnDaftar = document.getElementById('btn-daftar');

        if(!nama) return alert("Harap masukkan Nama Lengkap Anda!");
        if(!kelompok) return alert("Harap masukkan Nama Kelompok Anda!");
        if(!desa) return alert("Harap masukkan Wilayah Desa Anda!");

        let nilaiTambahan = "";
        if (status === "Generus") {
            nilaiTambahan = document.getElementById('usia').value;
        } else if (status === "Pengurus") {
            nilaiTambahan = document.getElementById('input_dapukan').value.trim();
            if(!nilaiTambahan) return alert("Harap masukkan Dapukan Anda!");
        }

        btnDaftar.innerText = "Menyimpan data...";
        btnDaftar.disabled = true;

        const dataJemaah = {
            id_generus: idGenerus,
            nama_lengkap: nama,
            jenis_kelamin: jenisKelamin, 
            status: status,               
            usia_dapukan: nilaiTambahan, 
            kelompok: kelompok,
            desa: desa
        };

        let { error } = await _supabase.from('data_generus').insert([dataJemaah]);

        if (error) {
            if(error.code === '23505') {
                document.getElementById('id_generus').value = "";
                buatIdOtomatis(); 
                alert("Sistem mendeteksi ID sibuk. ID baru telah dibuat otomatis, silakan klik tombol sekali lagi!");
            } else {
                alert("Gagal mendaftar, silakan coba lagi: " + error.message);
            }
            btnDaftar.innerText = "Kirim & Buat QR Code";
            btnDaftar.disabled = false;
            return;
        }

        prosesBikinIDCardHTML(idGenerus, nama, status);
    }

    function prosesBikinIDCardHTML(idText, namaOrang, statusUser) {
        // 1. Set teks komponen kartu HTML
        document.getElementById('card-status-title').innerText = `ID ${statusUser.toUpperCase()}`;
        document.getElementById('card-identitas-text').innerText = `${namaOrang.toUpperCase()} - ${idText}`;

        // 2. Buat QR Code lokal di memori memakai QRious
        let targetQr = document.getElementById("qrcode-target");
        targetQr.innerHTML = "";
        let hiddenCanvas = document.createElement("canvas");
        new QRious({
            element: hiddenCanvas,
            value: idText,
            size: 200,
            level: 'H'
        });

        let imgQr = document.createElement("img");
        imgQr.src = hiddenCanvas.toDataURL("image/png");
        targetQr.appendChild(imgQr);

        // 3. Eksekusi html2canvas setelah gambar background termuat sempurna
        setTimeout(() => {
            let elemenKartu = document.getElementById("idcard-html-layout");
            
            html2canvas(elemenKartu, {
                useCORS: true,
                allowTaint: false,
                scale: 2, /* Meningkatkan ketajaman gambar hasil simpanan */
                logging: false
            }).then(canvasHasil => {
                let dataUrlJpg = canvasHasil.toDataURL("image/jpeg", 0.95);
                
                // Masukkan hasil foto murni ke area fallback yang aman ditekan lama
                let fallbackImg = document.getElementById("idcard-fallback-img");
                fallbackImg.src = dataUrlJpg;
                
                document.getElementById('result-section').style.display = "block";
                document.getElementById('btn-daftar').style.display = "none";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            });
        }, 600);
    }

    function unduhIDCardSnapshot() {
        let idText = document.getElementById('id_generus').value.trim();
        let namaOrang = document.getElementById('nama').value.trim();
        let namaFile = `ID_CARD_${idText}_${namaOrang.replace(/\s+/g, '_')}.jpg`;
        let dataUrlJpg = document.getElementById("idcard-fallback-img").src;

        if(!dataUrlJpg) return alert("Gambar belum siap, silakan tunggu sebentar.");

        let link = document.createElement("a");
        link.href = dataUrlJpg; 
        link.download = namaFile;            
        document.body.appendChild(link); 
        link.click(); 
        document.body.removeChild(link);
    }
</script>
</body>
</html>
