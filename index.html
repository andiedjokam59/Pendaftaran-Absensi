<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pendaftaran | Insan Qur'any</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #0f172a;
            --gold: #b48c4d;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--accent);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 450px;
            background: var(--glass);
            padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; text-align: center; }
        .subtitle { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #94a3b8; margin-bottom: 8px; display: block; }
        
        input, select {
            width: 100%; padding: 14px; border: 1px solid #e2e8f0;
            border-radius: 12px; font-size: 15px; background: #fcfcfc;
            transition: all 0.3s ease; box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 4px rgba(180, 140, 77, 0.1); }
        
        .btn {
            width: 100%; padding: 16px; background: var(--accent);
            color: #fff; border: none; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { background: var(--gold); transform: translateY(-2px); }

        .qr-result-box { margin-top: 30px; display: none; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 30px; }
        #qrcode img { width: 180px; padding: 10px; border: 1px solid #eee; border-radius: 16px; }
        .dynamic-field { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registrasi Keanggotaan</h2>
    <p class="subtitle">Insan Qur'any Tawangmangu</p>
    
    <div class="form-group">
        <label>ID Member</label>
        <input type="text" id="id_generus" readonly style="font-weight: 700; color: var(--gold);">
    </div>
    
    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama Anda" onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label>Status</label>
        <select id="status" onchange="handleStatusChange()">
            <option value="Generus">Generus</option>
            <option value="Pengurus">Pengurus</option>
            <option value="MT">MT</option>
        </select>
    </div>

    <div id="field-usia" class="form-group">
        <label>Usia</label>
        <select id="usia">
            <option value="PAUD">PAUD</option><option value="TK">TK</option><option value="Caberawit">Caberawit</option>
            <option value="Pra Remaja">Pra Remaja</option><option value="Remaja">Remaja</option>
        </select>
    </div>

    <div id="field-dapukan" class="form-group dynamic-field">
        <label>Dapukan</label>
        <input type="text" id="input_dapukan" placeholder="Jabatan/Tugas" onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label>Kelompok</label>
        <input type="text" id="kelompok" placeholder="Nama kelompok" onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label>Desa</label>
        <input type="text" id="desa" placeholder="Nama desa" onblur="formatKapital(this)">
    </div>

    <button class="btn" id="btn-daftar" onclick="prosesPendaftaran()">Generate ID Card</button>

    <div id="result-section" class="qr-result-box">
        <div id="qrcode"></div>
        <button class="btn" style="background: var(--gold);" onclick="unduhIDCard()">Simpan ID Card</button>
    </div>
</div>

<script>
    function formatKapital(el) {
        if (!el.value) return;
        el.value = el.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    }

    function handleStatusChange() {
        const s = document.getElementById('status').value;
        document.getElementById('field-usia').style.display = (s === "Generus") ? "block" : "none";
        document.getElementById('field-dapukan').style.display = (s === "Pengurus") ? "block" : "none";
    }

    // Inisialisasi ID
    document.getElementById('id_generus').value = "IQ" + Math.floor(10000 + Math.random() * 90000);

    function prosesPendaftaran() {
        const qr = new QRious({
            element: document.createElement('canvas'),
            value: document.getElementById('id_generus').value,
            size: 250
        });
        document.getElementById('qrcode').innerHTML = `<img src="${qr.toDataURL()}">`;
        document.getElementById('result-section').style.display = "block";
        document.getElementById('btn-daftar').style.display = "none";
    }
    
    function unduhIDCard() { alert("Fungsi unduh aktif"); }
</script>
</body>
</html>
