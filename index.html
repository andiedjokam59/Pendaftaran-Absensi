<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mandiri & QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #047857; --primary-hover: #065f46; --bg-main: #f1f5f9; --bg-card: #ffffff; --text-dark: #0f172a; --border-color: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 420px; background: var(--bg-card); padding: 28px 24px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        h2 { text-align: center; color: var(--primary); font-size: 22px; font-weight: 700; margin: 0 0 24px 0; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; color: var(--text-dark); }
        input, select { width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .dynamic-field { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pendaftaran Mandiri</h2>
    
    <div class="form-group">
        <label>ID Anggota</label>
        <input type="text" id="id_generus" readonly>
    </div>
    
    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Ketik nama lengkap..." onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label>Status</label>
        <select id="status" onchange="handleStatusChange()">
            <option value="Generus">Generus</option>
            <option value="Pengurus">Pengurus</option>
            <option value="MT">MT</option>
        </select>
    </div>

    <div class="form-group dynamic-field" id="field-usia">
        <label>Usia</label>
        <select id="usia">
            <option value="PAUD">PAUD</option><option value="TK">TK</option><option value="Caberawit">Caberawit</option>
        </select>
    </div>

    <div class="form-group dynamic-field" id="field-dapukan">
        <label>Dapukan</label>
        <input type="text" id="input_dapukan" placeholder="Ketik dapukan..." onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label>Kelompok</label>
        <input type="text" id="kelompok" placeholder="Contoh: Blimbing 1" onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label>Desa</label>
        <input type="text" id="desa" placeholder="Contoh: Karanglo Selatan" onblur="formatKapital(this)">
    </div>

    <button class="btn" id="btn-daftar" onclick="prosesPendaftaran()">Kirim & Buat QR Code</button>
</div>

<script>
    // Fungsi perbaikan: Menggunakan 'onblur' agar tidak bentrok dengan keyboard HP saat mengetik spasi
    function formatKapital(el) {
        let kata = el.value.split(' ');
        let hasil = kata.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        el.value = hasil;
    }

    function handleStatusChange() {
        const s = document.getElementById('status').value;
        document.getElementById('field-usia').style.display = (s === "Generus") ? "block" : "none";
        document.getElementById('field-dapukan').style.display = (s === "Pengurus") ? "block" : "none";
    }

    // Inisialisasi ID
    document.getElementById('id_generus').value = "IQ" + Math.floor(10000 + Math.random() * 90000);
    
    async function prosesPendaftaran() {
        // Logika pengiriman data ke Supabase tetap sama...
        alert("Data akan dikirim ke sistem...");
    }
</script>
</body>
</html>
